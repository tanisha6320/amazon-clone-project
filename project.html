<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Amazon Clone</title>
    <link rel="stylesheet" href="project.css">
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar">
    <div class="logo">amazon.in</div>

    <div class="nav-links">
        <a href="#">Home</a>
        <a href="#">Mobiles</a>
        <a href="#">Laptops</a>
        <a href="#">Fashion</a>
        <a href="#">Electronics</a>
    </div>

    <div class="search-box">
        <input type="text" id="searchBar" placeholder="Search products...">
    </div>

    <div class="cart">
        🛒 Cart (<span id="cartCount">0</span>)
    </div>
</nav>

<!-- HERO SECTION -->
<div class="hero">
    <h2>Welcome to Amazon Clone</h2>
    <p>Best deals on electronics & more</p>
</div>

<!-- PRODUCTS -->
<section class="products" id="productList"></section>

<!-- CART -->
<section class="cartBox">
    <h2>Your Cart</h2>
    <div id="cartItems"></div>
</section>

<script src="project.js"></script>
</body>
</html>
